name: Zip Face Landmarker

on:
  workflow_dispatch:

jobs:
  zip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          cd examples
          zip -r face-landmarker-android.zip face_landmarker/android

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: face-landmarker-android
          path: examples/face-landmarker-android.zip